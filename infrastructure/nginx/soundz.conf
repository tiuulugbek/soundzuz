map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream soundz_web { server web:3000; }
upstream soundz_admin { server admin:3001; }
upstream soundz_api { server api:4000; }

server {
  listen 80;
  server_name soundz.uz www.soundz.uz admin.soundz.uz api.soundz.uz;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name soundz.uz www.soundz.uz;
  ssl_certificate /etc/letsencrypt/live/soundz.uz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/soundz.uz/privkey.pem;
  client_max_body_size 20m;
  location / {
    proxy_pass http://soundz_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.soundz.uz;
  ssl_certificate /etc/letsencrypt/live/soundz.uz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/soundz.uz/privkey.pem;
  location / {
    proxy_pass http://soundz_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name api.soundz.uz;
  ssl_certificate /etc/letsencrypt/live/soundz.uz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/soundz.uz/privkey.pem;
  client_max_body_size 20m;
  location / {
    proxy_pass http://soundz_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
