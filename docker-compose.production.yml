services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  api:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    command: ["pnpm", "--filter", "@soundz/api", "start"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER}
      MEDIA_STORAGE_PATH: ${MEDIA_STORAGE_PATH}
      MEDIA_S3_ENDPOINT: ${MEDIA_S3_ENDPOINT}
      MEDIA_S3_REGION: ${MEDIA_S3_REGION}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET}
      MEDIA_S3_ACCESS_KEY_ID: ${MEDIA_S3_ACCESS_KEY_ID}
      MEDIA_S3_SECRET_ACCESS_KEY: ${MEDIA_S3_SECRET_ACCESS_KEY}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL}
      DB_HOST: postgres
      DB_PORT: 5432
      RUN_DATABASE_MIGRATIONS: "true"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [backend, edge]

  worker:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    restart: unless-stopped
    command: ["pnpm", "--filter", "@soundz/worker", "start"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_LEADS_CHAT_ID: ${TELEGRAM_LEADS_CHAT_ID}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      api: { condition: service_healthy }
    networks: [backend]

  web:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    restart: unless-stopped
    command: ["pnpm", "--filter", "@soundz/web", "start"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      WAIT_FOR_DATABASE: "false"
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [edge]

  admin:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    restart: unless-stopped
    command: ["pnpm", "--filter", "@soundz/admin", "start"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      WAIT_FOR_DATABASE: "false"
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/login"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [edge]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/soundz.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      web: { condition: service_healthy }
      admin: { condition: service_healthy }
      api: { condition: service_healthy }
    networks: [edge]

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    internal: true
  edge:
