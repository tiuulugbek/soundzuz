# Soundz EDGE GATEWAY — new.soundz.uz uchun (Docker Nginx, host Nginx orqasida).
# Host Nginx: new.soundz.uz (SSL) -> http://127.0.0.1:8085 -> shu gateway -> web:3000.
#
# MUHIM (502 tuzatilishi): `web` Docker DNS orqali HAR SAFAR qayta resolve qilinadi.
# Konteyner qayta yaratilib yangi IP olsa ham, Nginx eski IP'ni keshda saqlamaydi —
# `resolver` + `proxy_pass http://$o'zgaruvchi` runtime resolve'ni majbur qiladi.
# Shu sabab statik `upstream { server web:3000; }` ISHLATILMAYDI.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80 default_server;
  server_name new.soundz.uz _;

  # Docker ichki DNS. valid=10s — IP'ni 10 soniyada qayta resolve qiladi.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 3s;

  client_max_body_size 15m;

  # Sog'liq tekshiruvi (host Nginx yoki monitoring uchun)
  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location / {
    # O'zgaruvchi => proxy_pass runtime'da resolve qiladi (kesh yo'q).
    set $soundz_web web:3000;
    proxy_pass http://$soundz_web;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # Deploy paytida web bir zum band bo'lsa — tez fail va keyingi urinish.
    proxy_connect_timeout 3s;
    proxy_read_timeout    60s;
    proxy_next_upstream   error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }
}
