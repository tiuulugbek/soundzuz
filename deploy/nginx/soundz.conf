# Soundz — asosiy Docker Nginx (compose `nginx` servisi, 80/443).
# MUHIM: barcha upstream'lar Docker DNS orqali runtime'da qayta resolve qilinadi
# (resolver + proxy_pass http://$o'zgaruvchi). Statik `upstream { server web:3000; }`
# konteyner qayta yaratilganda eski IP'ni keshlab 502 berardi — shu sabab olib tashlandi.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name soundz.uz www.soundz.uz admin.soundz.uz api.soundz.uz new.soundz.uz;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name soundz.uz www.soundz.uz new.soundz.uz;
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  client_max_body_size 15m;

  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 3s;

  location / {
    set $soundz_web web:3000;
    proxy_pass http://$soundz_web;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_connect_timeout 3s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.soundz.uz;
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  client_max_body_size 15m;

  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 3s;

  location / {
    set $soundz_admin admin:3001;
    proxy_pass http://$soundz_admin;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_connect_timeout 3s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }
}

server {
  listen 443 ssl http2;
  server_name api.soundz.uz;
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  client_max_body_size 15m;

  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 3s;

  location / {
    set $soundz_api api:4000;
    proxy_pass http://$soundz_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_connect_timeout 3s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }
}
