name: Production E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Production or staging URL
        required: false
        default: https://soundz.uz
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      E2E_BASE_URL: ${{ inputs.base_url || 'https://soundz.uz' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm e2e:install
      - run: pnpm e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
