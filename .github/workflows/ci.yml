name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --no-frozen-lockfile --reporter=silent
      - run: docker compose --env-file .env.production.example -f docker-compose.production.yml config --quiet
      - run: docker compose --env-file .env.production.example -f docker-compose.production.yml -f docker-compose.monitoring.yml config --quiet
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      - run: pnpm --filter "./packages/**" build
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck -- --pretty false > typecheck.log 2>&1
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
      - name: Fail on typecheck errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/v1
          NEXT_PUBLIC_SITE_URL: https://soundz.uz
