name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      - run: pnpm --filter "./packages/**" build
      - name: Capture typecheck diagnostics
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          echo "$status" > typecheck-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-log-latest
          path: |
            typecheck.log
            typecheck-status.txt
      - name: Fail when typecheck failed
        shell: bash
        run: |
          test "$(cat typecheck-status.txt)" = "0"
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/v1
