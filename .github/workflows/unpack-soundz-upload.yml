name: Unpack Soundz source

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/unpack-soundz-upload.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild and verify archive
        shell: bash
        run: |
          set -euo pipefail
          cat .upload4/part-*.b64 | base64 --decode > /tmp/soundz-platform.tar.xz
          echo 'd68398b797d9e8836325f9e5331113c661bb25fe21d31ddeb6e74e9c8d60a8ac  /tmp/soundz-platform.tar.xz' | sha256sum --check
          mkdir -p /tmp/soundz-source
          tar -xJf /tmp/soundz-platform.tar.xz -C /tmp/soundz-source
          test -f /tmp/soundz-source/soundz-platform-phase-1/package.json
          test -f /tmp/soundz-source/soundz-platform-phase-1/apps/api/package.json
          test -f /tmp/soundz-source/soundz-platform-phase-1/packages/database/prisma/schema.prisma

      - name: Replace temporary upload with source files
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a /tmp/soundz-source/soundz-platform-phase-1/. ./

      - name: Commit complete source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Initialize complete Soundz platform source'
          git push origin HEAD:main
